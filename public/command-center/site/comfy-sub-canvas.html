<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Comfy Mini Canvas</title>
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;background:#080c13;color:#e8eef9;font:12px Inter,system-ui,sans-serif}
    .app{height:100%;display:grid;grid-template-rows:40px 1fr 124px}
    .top{
      display:flex;align-items:center;gap:8px;padding:0 10px;
      border-bottom:1px solid rgba(255,255,255,.08);
      background:linear-gradient(180deg,#0f1726,#0b121d)
    }
    .ttl{font:700 12px/1 Inter,system-ui,sans-serif;color:#fff}
    .sub{font:500 10px/1 Inter,system-ui,sans-serif;color:#9db0cb}
    .chip{margin-left:auto;padding:3px 7px;border-radius:999px;border:1px solid #2b4a7a;background:#12233b;color:#cde0ff;font:600 9px/1 Inter}
    .btn{
      border:1px solid rgba(255,255,255,.14);background:#121f31;color:#fff;border-radius:7px;
      padding:6px 9px;font:600 10px/1 Inter,system-ui,sans-serif;cursor:pointer
    }
    .btn:hover{background:#1a2b45}
    .btn.primary{background:#2d6be0;border-color:#5b8dec}
    .btn.primary:hover{background:#3678f0}
    #graph{
      position:relative;overflow:auto;
      background:
        linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),
        linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px),
        #0a1019;
      background-size:24px 24px,24px 24px,auto;
    }
    #stage{position:relative;width:1320px;height:700px}
    #links{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
    .edge{fill:none;stroke:#73b5ff;stroke-width:2;stroke-opacity:.85}
    .edge.neg{stroke:#ff8ad8}
    .node{
      position:absolute;width:250px;border-radius:10px;
      background:#131c2a;border:1px solid rgba(255,255,255,.12);
      box-shadow:0 8px 30px rgba(0,0,0,.32);overflow:hidden
    }
    .node.hint{background:#2b1d22;border-color:#6a3e49}
    .node-head{
      height:26px;padding:0 9px;display:flex;align-items:center;justify-content:space-between;
      font:700 10px/1 Inter;background:#1a2434;color:#e8eef9;cursor:grab
    }
    .node.hint .node-head{background:#4a2d34}
    .node-body{padding:8px;display:grid;gap:6px}
    .fld{display:grid;gap:4px}
    .fld label{font:600 8px/1 Inter;color:#a8bedf;text-transform:uppercase;letter-spacing:.06em}
    .fld input,.fld textarea,.fld select{
      width:100%;background:#0b111a;border:1px solid rgba(255,255,255,.12);color:#fff;border-radius:7px;
      padding:6px 7px;font:11px/1.3 Inter;outline:none
    }
    .fld textarea{min-height:58px;resize:vertical}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:6px}
    .io{font:500 9px/1 Inter;color:#8ca4c7}
    .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#73b5ff;margin-right:5px}
    .dot.pink{background:#ff8ad8}
    .bottom{
      border-top:1px solid rgba(255,255,255,.08);background:#0d1522;
      display:grid;grid-template-columns:1.2fr 2fr;gap:8px;padding:8px
    }
    .cfg{
      border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:8px;background:#101a2a;display:grid;gap:6px
    }
    .cfg .fld input{font-size:10px;padding:5px 6px}
    .status{
      border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:7px;background:#0b111a;color:#d8e5fb;font-size:10px
    }
    .out{display:grid;grid-template-columns:repeat(auto-fill,minmax(94px,1fr));gap:6px;align-content:start}
    .card{border:1px solid rgba(255,255,255,.12);border-radius:8px;overflow:hidden;background:#0b111a;text-decoration:none}
    .thumb{width:100%;height:58px;object-fit:cover;background:#0f1a29;display:block}
    .meta{padding:4px 6px;font-size:9px;color:#b7c8df;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <div>
        <div class="ttl">Mini Comfy Canvas</div>
        <div class="sub">Drag nodes, edit params, run instantly</div>
      </div>
      <button class="btn" id="btnOpen" title="Open full editor">Open Full</button>
      <button class="btn" id="btnTest">Test</button>
      <button class="btn" id="btnSave">Save</button>
      <button class="btn primary" id="btnRun">Run</button>
      <span class="chip">Local</span>
    </div>
    <div id="graph">
      <div id="stage">
        <svg id="links"></svg>
        <div id="nodes"></div>
      </div>
    </div>
    <div class="bottom">
      <div class="cfg">
        <div class="fld">
          <label>Comfy Base URL</label>
          <input id="baseUrl" placeholder="http://127.0.0.1:8188">
        </div>
        <div class="fld">
          <label>API Key (optional)</label>
          <input id="apiKey" type="password" placeholder="x-api-key / bearer">
        </div>
        <div id="status" class="status">Idle</div>
      </div>
      <div id="outputs" class="out"></div>
    </div>
  </div>
  <script>
    const qs = new URLSearchParams(location.search);
    const nodeId = qs.get('nodeId') || '';
    const isEditor = qs.get('editor') === '1';
    const STORAGE_KEY = 'openflow.comfy.config.v2';
    const DEFAULT_BASE_URL = 'http://127.0.0.1:8188';
    const DEFAULT_WORKFLOW_PATH = './gsl_starter_1_1.json';

    const $ = id => document.getElementById(id);
    const nodesRoot = $('nodes');
    const linksSvg = $('links');
    const statusEl = $('status');
    const outputsEl = $('outputs');
    const state = { workflow: null, pollTimer: null, running: false, runningNotified: false, promptId: null };

    function notify(payload){
      const data = Object.assign({ type: 'openflow.comfy.status', source: 'openflow-comfy', nodeId }, payload || {});
      window.parent && window.parent.postMessage(data, '*');
    }
    function setStatus(txt, tone){
      statusEl.textContent = txt;
      statusEl.style.borderColor = tone==='err'?'rgba(239,68,68,.55)':tone==='ok'?'rgba(16,185,129,.55)':'rgba(255,255,255,.12)';
      statusEl.style.color = tone==='err'?'#fecaca':'#d8e5fb';
    }
    function readCfg(){
      try{
        const p = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        return { baseUrl: p.baseUrl || DEFAULT_BASE_URL, apiKey: p.apiKey || '', workflowText: p.workflowText || '' };
      }catch{
        return { baseUrl: DEFAULT_BASE_URL, apiKey: '', workflowText: '' };
      }
    }
    function saveCfg(){
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        baseUrl: $('baseUrl').value.trim(),
        apiKey: $('apiKey').value.trim(),
        workflowText: JSON.stringify(state.workflow || {}, null, 2)
      }));
      setStatus('Saved', 'ok');
    }
    function baseUrl(){ return $('baseUrl').value.trim().replace(/\/+$/, ''); }
    function comfyFetch(path, options){
      const headers = Object.assign({ 'Content-Type':'application/json' }, options?.headers || {});
      const key = $('apiKey').value.trim();
      if(key){ headers['Authorization'] = `Bearer ${key}`; headers['x-api-key'] = key; }
      return fetch(`${baseUrl()}${path}`, Object.assign({}, options || {}, { headers }));
    }

    function nodeByType(type){
      return Object.values(state.workflow || {}).find(n => n && n.class_type === type) || null;
    }
    function firstByPrefix(prefix){
      return Object.values(state.workflow || {}).find(n => n && String(n.class_type||'').startsWith(prefix)) || null;
    }

    const editor = {
      nodes: [
        { id:'checkpoint', title:'Load Model', x:40, y:120, cls:'', build:buildCheckpoint },
        { id:'promptPos', title:'Positive Prompt', x:340, y:100, cls:'', build:buildPromptPos },
        { id:'promptNeg', title:'Negative Prompt', x:340, y:300, cls:'', build:buildPromptNeg },
        { id:'latent', title:'Latent Size', x:640, y:330, cls:'', build:buildLatent },
        { id:'sampler', title:'KSampler', x:640, y:110, cls:'', build:buildSampler },
        { id:'decode', title:'Decode', x:940, y:120, cls:'', build:buildDecode },
        { id:'save', title:'Save', x:1140, y:120, cls:'', build:buildSave },
        { id:'hint', title:'Workflow', x:40, y:24, cls:'hint', build:buildHint }
      ],
      links: [
        ['checkpoint','promptPos','edge'],
        ['checkpoint','promptNeg','edge'],
        ['checkpoint','sampler','edge'],
        ['promptPos','sampler','edge'],
        ['promptNeg','sampler','edge neg'],
        ['latent','sampler','edge neg'],
        ['sampler','decode','edge'],
        ['decode','save','edge']
      ]
    };

    function buildHint(){ return `<div class="io"><span class="dot"></span>Drag cards and edit values. Run uses this live graph state.</div>`; }
    function buildCheckpoint(){
      const ckpt = nodeByType('CheckpointLoaderSimple');
      const unet = nodeByType('UNETLoader');
      const val = ckpt?.inputs?.ckpt_name || unet?.inputs?.unet_name || '';
      return `<div class="fld"><label>Model</label><input data-k="modelName" value="${escAttr(val)}"></div>`;
    }
    function buildPromptPos(){
      const n = nodeByType('CLIPTextEncode');
      const txt = n?.inputs?.text || '';
      return `<div class="fld"><label>Prompt</label><textarea data-k="promptPos">${escHtml(txt)}</textarea></div>`;
    }
    function buildPromptNeg(){
      const all = Object.values(state.workflow || {}).filter(n => n && n.class_type==='CLIPTextEncode');
      const txt = all[1]?.inputs?.text || '';
      return `<div class="fld"><label>Negative</label><textarea data-k="promptNeg">${escHtml(txt)}</textarea></div>`;
    }
    function buildLatent(){
      const n = nodeByType('EmptyLatentImage') || nodeByType('EmptyHunyuanLatentVideo');
      return `<div class="row">
        <div class="fld"><label>Width</label><input data-k="latentW" value="${escAttr(n?.inputs?.width ?? 512)}"></div>
        <div class="fld"><label>Height</label><input data-k="latentH" value="${escAttr(n?.inputs?.height ?? 512)}"></div>
      </div>
      <div class="row">
        <div class="fld"><label>Length</label><input data-k="latentLen" value="${escAttr(n?.inputs?.length ?? 1)}"></div>
        <div class="fld"><label>Batch</label><input data-k="latentBatch" value="${escAttr(n?.inputs?.batch_size ?? 1)}"></div>
      </div>`;
    }
    function buildSampler(){
      const n = nodeByType('KSampler');
      return `<div class="row">
        <div class="fld"><label>Seed</label><input data-k="seed" value="${escAttr(n?.inputs?.seed ?? 1)}"></div>
        <div class="fld"><label>Steps</label><input data-k="steps" value="${escAttr(n?.inputs?.steps ?? 20)}"></div>
      </div>
      <div class="row">
        <div class="fld"><label>CFG</label><input data-k="cfg" value="${escAttr(n?.inputs?.cfg ?? 7)}"></div>
        <div class="fld"><label>Denoise</label><input data-k="denoise" value="${escAttr(n?.inputs?.denoise ?? 1)}"></div>
      </div>
      <div class="row">
        <div class="fld"><label>Sampler</label><input data-k="sampler" value="${escAttr(n?.inputs?.sampler_name ?? 'euler')}"></div>
        <div class="fld"><label>Scheduler</label><input data-k="scheduler" value="${escAttr(n?.inputs?.scheduler ?? 'normal')}"></div>
      </div>`;
    }
    function buildDecode(){
      const n = nodeByType('VAEDecode');
      return `<div class="io"><span class="dot"></span>${n ? 'VAE Decode active' : 'No VAE decode node found'}</div>`;
    }
    function buildSave(){
      const n = nodeByType('SaveImage') || nodeByType('SaveVideo');
      const val = n?.inputs?.filename_prefix || 'ComfyUI';
      return `<div class="fld"><label>Filename Prefix</label><input data-k="savePrefix" value="${escAttr(val)}"></div>`;
    }
    function escAttr(v){ return String(v ?? '').replace(/&/g,'&amp;').replace(/"/g,'&quot;'); }
    function escHtml(v){ return String(v ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function renderEditor(){
      nodesRoot.innerHTML = editor.nodes.map(n => `
        <div class="node ${n.cls||''}" data-id="${n.id}" style="left:${n.x}px;top:${n.y}px">
          <div class="node-head" data-drag="${n.id}">${n.title}<span>⋯</span></div>
          <div class="node-body">${n.build()}</div>
        </div>
      `).join('');
      bindDrag();
      bindInputs();
      renderLinks();
    }
    function nodeRectById(id){
      const n = editor.nodes.find(x => x.id===id);
      if(!n) return null;
      const el = nodesRoot.querySelector(`.node[data-id="${id}"]`);
      const w = el ? el.offsetWidth : 250;
      const h = el ? el.offsetHeight : 100;
      return { x:n.x, y:n.y, w, h };
    }
    function renderLinks(){
      const paths = editor.links.map(([a,b,cls]) => {
        const A = nodeRectById(a), B = nodeRectById(b);
        if(!A||!B) return '';
        const x1 = A.x + A.w, y1 = A.y + A.h/2;
        const x2 = B.x, y2 = B.y + B.h/2;
        const dx = Math.max(70, Math.abs(x2-x1)*0.38);
        return `<path class="${cls}" d="M${x1},${y1} C${x1+dx},${y1} ${x2-dx},${y2} ${x2},${y2}"></path>`;
      }).join('');
      linksSvg.innerHTML = paths;
    }
    function bindDrag(){
      let drag = null;
      nodesRoot.querySelectorAll('[data-drag]').forEach(h => {
        h.onmousedown = e => {
          const id = h.getAttribute('data-drag');
          const n = editor.nodes.find(x => x.id===id);
          if(!n) return;
          drag = { id, sx:e.clientX, sy:e.clientY, ox:n.x, oy:n.y };
          e.preventDefault();
        };
      });
      window.onmousemove = e => {
        if(!drag) return;
        const n = editor.nodes.find(x => x.id===drag.id); if(!n) return;
        n.x = drag.ox + (e.clientX-drag.sx);
        n.y = drag.oy + (e.clientY-drag.sy);
        const el = nodesRoot.querySelector(`.node[data-id="${drag.id}"]`);
        if(el){ el.style.left = n.x+'px'; el.style.top = n.y+'px'; }
        renderLinks();
      };
      window.onmouseup = () => { drag = null; };
    }
    function bindInputs(){
      nodesRoot.querySelectorAll('input[data-k],textarea[data-k]').forEach(elm => {
        elm.oninput = () => applyEditorToWorkflow();
      });
    }
    function v(k, fallback=''){
      const el = nodesRoot.querySelector(`[data-k="${k}"]`);
      return el ? el.value : fallback;
    }
    function applyEditorToWorkflow(){
      const wf = state.workflow || {};
      const ckpt = Object.values(wf).find(n => n?.class_type==='CheckpointLoaderSimple');
      const unet = Object.values(wf).find(n => n?.class_type==='UNETLoader');
      const clips = Object.values(wf).filter(n => n?.class_type==='CLIPTextEncode');
      const sampler = Object.values(wf).find(n => n?.class_type==='KSampler');
      const latent = Object.values(wf).find(n => n?.class_type==='EmptyLatentImage' || n?.class_type==='EmptyHunyuanLatentVideo');
      const save = Object.values(wf).find(n => n?.class_type==='SaveImage' || n?.class_type==='SaveVideo');

      if(ckpt?.inputs) ckpt.inputs.ckpt_name = v('modelName', ckpt.inputs.ckpt_name || '');
      if(unet?.inputs) unet.inputs.unet_name = v('modelName', unet.inputs.unet_name || '');
      if(clips[0]?.inputs) clips[0].inputs.text = v('promptPos', clips[0].inputs.text || '');
      if(clips[1]?.inputs) clips[1].inputs.text = v('promptNeg', clips[1].inputs.text || '');
      if(sampler?.inputs){
        sampler.inputs.seed = Number(v('seed', sampler.inputs.seed));
        sampler.inputs.steps = Number(v('steps', sampler.inputs.steps));
        sampler.inputs.cfg = Number(v('cfg', sampler.inputs.cfg));
        sampler.inputs.denoise = Number(v('denoise', sampler.inputs.denoise));
        sampler.inputs.sampler_name = v('sampler', sampler.inputs.sampler_name || 'euler');
        sampler.inputs.scheduler = v('scheduler', sampler.inputs.scheduler || 'normal');
      }
      if(latent?.inputs){
        latent.inputs.width = Number(v('latentW', latent.inputs.width));
        latent.inputs.height = Number(v('latentH', latent.inputs.height));
        if('length' in latent.inputs) latent.inputs.length = Number(v('latentLen', latent.inputs.length));
        if('batch_size' in latent.inputs) latent.inputs.batch_size = Number(v('latentBatch', latent.inputs.batch_size));
      }
      if(save?.inputs) save.inputs.filename_prefix = v('savePrefix', save.inputs.filename_prefix || 'ComfyUI');
      state.workflow = wf;
      return wf;
    }

    function stopPolling(){
      if(state.pollTimer){ clearTimeout(state.pollTimer); state.pollTimer = null; }
      state.running = false;
      state.runningNotified = false;
      $('btnRun').disabled = false;
    }
    function resolvePromptId(j){
      return j?.prompt_id || j?.data?.prompt_id || j?.result?.prompt_id;
    }
    function inferWorkflowName(wf){
      if(!wf||typeof wf!=='object') return 'workflow';
      const metas=Object.values(wf).map(n=>n?._meta?.title).filter(Boolean);
      const saveNode=Object.values(wf).find(n=>String(n?.class_type||'').startsWith('Save'));
      if(saveNode?.class_type) return saveNode.class_type;
      if(metas.length) return metas[0];
      return 'workflow';
    }
    function artifactUrl(item){
      if(!item) return '';
      if(item.url) return item.url;
      if(item.filename){
        const sub = encodeURIComponent(item.subfolder || '');
        const typ = encodeURIComponent(item.type || 'output');
        const fil = encodeURIComponent(item.filename);
        return `${baseUrl()}/view?filename=${fil}&subfolder=${sub}&type=${typ}`;
      }
      return typeof item === 'string' ? item : '';
    }
    function collectArtifacts(row){
      const bucket = row?.outputs || row || {};
      const out = [];
      for(const n of Object.values(bucket)){
        for(const k of ['images','videos','gifs','files']){
          const arr = Array.isArray(n?.[k]) ? n[k] : [];
          arr.forEach(it => {
            const u = artifactUrl(it);
            if(u) out.push({ type:k.slice(0,-1), url:u, preview:u });
          });
        }
      }
      return out;
    }
    function renderArtifacts(items){
      outputsEl.innerHTML = (items||[]).map((a,i) => {
        const media = String(a.type).includes('video')
          ? `<video class="thumb" src="${a.preview}" controls muted playsinline></video>`
          : `<img class="thumb" src="${a.preview}" alt="artifact ${i+1}">`;
        return `<a class="card" href="${a.url}" target="_blank" rel="noreferrer">${media}<div class="meta">${a.type} #${i+1}</div></a>`;
      }).join('');
    }
    async function testApi(){
      try{
        if(!baseUrl()) throw new Error('Base URL required');
        setStatus('Testing API…');
        const r = await comfyFetch('/queue', { method:'GET' });
        if(!r.ok) throw new Error(`HTTP ${r.status}`);
        setStatus('API reachable', 'ok');
      }catch(err){
        setStatus(`API test failed: ${err.message}`, 'err');
      }
    }
    async function pollHistory(promptId){
      try{
        const r = await comfyFetch(`/history/${encodeURIComponent(promptId)}`, { method:'GET' });
        if(!r.ok) throw new Error(`HTTP ${r.status}`);
        const json = await r.json();
        const row = json?.[promptId] || json?.data || json?.result || json;
        if(!row || !row.outputs || !Object.keys(row.outputs).length){
          setStatus('Running…');
          if(!state.runningNotified){ notify({ status:'running', promptId, workflowName: inferWorkflowName(state.workflow) }); state.runningNotified = true; }
          state.pollTimer = setTimeout(() => pollHistory(promptId), 1800);
          return;
        }
        const arts = collectArtifacts(row);
        renderArtifacts(arts);
        setStatus(`Completed · ${arts.length} artifact(s)`, 'ok');
        notify({ status:'completed', promptId, workflowName: inferWorkflowName(state.workflow), artifacts:arts });
        stopPolling();
      }catch(err){
        setStatus(`Run failed: ${err.message}`, 'err');
        notify({ status:'failed', promptId, workflowName: inferWorkflowName(state.workflow), error: err.message });
        stopPolling();
      }
    }
    async function run(){
      if(state.running) return;
      try{
        if(!baseUrl()) throw new Error('Base URL required');
        const wf = applyEditorToWorkflow();
        state.running = true;
        state.runningNotified = false;
        $('btnRun').disabled = true;
        renderArtifacts([]);
        setStatus('Submitting…');
        const body = { prompt: wf, client_id: (crypto.randomUUID ? crypto.randomUUID() : `openflow_${Date.now()}`) };
        const r = await comfyFetch('/prompt', { method:'POST', body: JSON.stringify(body) });
        if(!r.ok) throw new Error(`HTTP ${r.status}`);
        const json = await r.json();
        const promptId = resolvePromptId(json);
        if(!promptId) throw new Error('No prompt_id returned');
        state.promptId = promptId;
        setStatus(`Submitted · ${promptId}`);
        notify({ status:'submitted', promptId, workflowName: inferWorkflowName(state.workflow) });
        pollHistory(promptId);
      }catch(err){
        setStatus(`Submit failed: ${err.message}`, 'err');
        notify({ status:'failed', workflowName: inferWorkflowName(state.workflow), error: err.message });
        stopPolling();
      }
    }
    async function loadDefaultWorkflowText(){
      const cfg = readCfg();
      if(cfg.workflowText) return cfg.workflowText;
      const r = await fetch(DEFAULT_WORKFLOW_PATH, { cache:'no-store' });
      if(r.ok) return await r.text();
      return '{}';
    }
    function openFull(){
      notify({ type:'openflow.comfy.openEditor', nodeId });
    }

    (async function init(){
      const cfg = readCfg();
      $('baseUrl').value = cfg.baseUrl;
      $('apiKey').value = cfg.apiKey;
      const txt = await loadDefaultWorkflowText();
      state.workflow = JSON.parse(txt || '{}');
      renderEditor();
      $('btnSave').addEventListener('click', saveCfg);
      $('btnTest').addEventListener('click', testApi);
      $('btnRun').addEventListener('click', run);
      $('btnOpen').addEventListener('click', openFull);
      if(isEditor){ $('btnOpen').style.display = 'none'; }
      setStatus('Idle');
      notify({ status:'idle' });
    })();
  </script>
</body>
</html>
