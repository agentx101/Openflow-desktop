name: Sync Version From Backend

on:
  repository_dispatch:
    types: [sync-version-from-backend]
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip if sync token missing
        id: guard
        run: |
          if [ -z "${{ secrets.OPENFLOW_SYNC_TOKEN }}" ]; then
            echo "missing=true" >> "$GITHUB_OUTPUT"
            echo "OPENFLOW_SYNC_TOKEN is not set; skipping version sync."
          else
            echo "missing=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Read backend version
        if: steps.guard.outputs.missing == 'false'
        id: backend
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.OPENFLOW_SYNC_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const res = await github.rest.repos.getContent({
              owner,
              repo: "Openflow-backend",
              path: "package.json"
            });
            const text = Buffer.from(res.data.content, "base64").toString("utf8");
            const pkg = JSON.parse(text);
            core.setOutput("version", pkg.version);

      - name: Align local package version
        if: steps.guard.outputs.missing == 'false'
        run: |
          node -e '
          const fs = require("fs");
          const p = "package.json";
          const backend = process.env.BACKEND_VERSION;
          const pkg = JSON.parse(fs.readFileSync(p, "utf8"));
          if (pkg.version !== backend) {
            pkg.version = backend;
            fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + "\n");
            console.log(`Version updated to ${backend}`);
          } else {
            console.log("Already aligned.");
          }'
        env:
          BACKEND_VERSION: ${{ steps.backend.outputs.version }}

      - name: Align Cargo version
        if: steps.guard.outputs.missing == 'false'
        run: |
          node -e '
          const fs = require("fs");
          const p = "src-tauri/Cargo.toml";
          const backend = process.env.BACKEND_VERSION;
          const text = fs.readFileSync(p, "utf8");
          const out = text.replace(/^version\\s*=\\s*\"[^\"]+\"/m, `version = "${backend}"`);
          if (out !== text) {
            fs.writeFileSync(p, out);
            console.log(`Cargo version updated to ${backend}`);
          } else {
            console.log("Cargo already aligned.");
          }'
        env:
          BACKEND_VERSION: ${{ steps.backend.outputs.version }}

      - name: Commit version sync
        if: steps.guard.outputs.missing == 'false'
        run: |
          if git diff --quiet; then
            echo "No version change."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/Cargo.toml
          git commit -m "chore: sync version with Openflow-backend"
          git push
