name: Desktop Build

on:
  workflow_dispatch:
  repository_dispatch:
    types: [release-from-backend]
  push:
    tags:
      - "v*"

jobs:
  tauri-build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install

      - name: Build desktop app
        run: npm run tauri:build

      - name: Upload desktop bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: openflow-desktop-bundle-${{ matrix.os }}-${{ github.run_number }}
          path: src-tauri/target/release/bundle
